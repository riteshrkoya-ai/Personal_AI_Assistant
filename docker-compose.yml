services:
  api:
    build: .
    container_name: personal_assistant_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - ollama
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  telegram-bot:
    build: .
    container_name: personal_assistant_telegram_bot
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - .:/app
    command: python -m app.bot.telegram_polling
    profiles:
      - telegram

  postgres:
    image: pgvector/pgvector:pg15
    container_name: personal_assistant_postgres
    environment:
      POSTGRES_DB: assistant_db
      POSTGRES_USER: assistant_user
      POSTGRES_PASSWORD: assistant_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: personal_assistant_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data: